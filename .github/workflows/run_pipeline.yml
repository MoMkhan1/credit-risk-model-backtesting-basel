name: Credit Risk Pipeline CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-test-run:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout repository
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Set up Docker Buildx for multi-stage builds
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    # 3. Cache pip dependencies for faster builds
    - name: Cache pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # 4. Build Docker image with version tag
    - name: Build Docker image
      run: |
        docker build --progress=plain -t momkhan1/credit-risk-pipeline:${{ github.run_number }} .

    # 5. Run modular tests for each script
    - name: Test data generation
      run: |
        docker run --rm momkhan1/credit-risk-pipeline:${{ github.run_number }} \
        python -c "from scripts.data_generation import generate_data; X_train, X_test, y_train_pd, y_test_pd, EAD_test = generate_data(); print('Data generation test passed!')"

    - name: Test model training
      run: |
        docker run --rm momkhan1/credit-risk-pipeline:${{ github.run_number }} \
        python -c "from scripts.model_training import train_pd_models; print('Model training test passed!')"

    - name: Test visualizations
      run: |
        docker run --rm momkhan1/credit-risk-pipeline:${{ github.run_number }} \
        python -c "from scripts.visualisation import create_visualizations; print('Visualizations test passed!')"

    - name: Test portfolio risk calculations
      run: |
        docker run --rm momkhan1/credit-risk-pipeline:${{ github.run_number }} \
        python -c "from scripts.portfolio_risk import compute_portfolio_risk; print('Portfolio risk test passed!')"

    # 6. Run full pipeline
    - name: Run full credit risk pipeline
      run: |
        docker run --rm momkhan1/credit-risk-pipeline:${{ github.run_number }} python scripts/credit_risk_pipeline.py

    # 7. Upload results as artifacts with run number for versioning
    - name: Upload outputs as artifacts
      uses: actions/upload-artifact@v3
      with:
        name: credit-risk-results-${{ github.run_number }}
        path: |
          results/
          figures/
          models/

    # 8. Optional: Notify (example Slack or email)
    # - name: Notify success (optional)
    #   run: curl -X POST -H 'Content-type: application/json' \
    #   --data '{"text":"Credit Risk Pipeline CI/CD workflow completed successfully!"}' ${{ secrets.SLACK_WEBHOOK_URL }}